<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE 341 - Contacts</title>
    <meta name="description" content="Contacts directory powered by a live MongoDB database">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
        integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="./data/database.js"></script>
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="container">
        <header class="page-header">
            <div class="header-content">
                <div class="stage">
                    <div class="pyramid3d">
                        <div class="triangle side1"></div>
                        <div class="triangle side2"></div>
                        <div class="triangle side3"></div>
                        <div class="triangle side4"></div>
                    </div>
                </div>
                <h1>Contacts</h1>
                <p class="subtitle" id="fone">My contacts </p>
            </div>
        </header>

        <main class="content">

            <div class="toolbar">
                <button id="toggleContactForm" class="primary-btn" type="button">+ Add Contact</button>
                <button id="viewUsersButton" class="secondary-btn" type="button"><i class="fas fa-users"></i> View All
                    User Info</button>
                <button id="backToContactsButton" class="secondary-btn" type="button" style="display:none;"><i
                        class="fas fa-arrow-left"></i> Back to Contacts</button>
                <p id="formMessage" class="form-message" aria-live="polite"></p>
            </div>
            <form id="contactForm" class="contact-form" style="display:none;">
                <div class="form-row">
                    <label class="field-group">
                        <span>First Name</span>
                        <input name="firstName" type="text" required>
                    </label>
                    <label class="field-group">
                        <span>Last Name</span>
                        <input name="lastName" type="text" required>
                    </label>
                </div>
                <div class="form-row">
                    <label class="field-group">
                        <span>Email</span>
                        <input name="email" type="email" required>
                    </label>
                    <label class="field-group">
                        <span>Favorite Color</span>
                        <input name="favoriteColor" type="text" required>
                    </label>
                </div>
                <div class="form-row single">
                    <label class="field-group">
                        <span>Birthday</span>
                        <input name="birthday" type="date" required>
                    </label>
                </div>
                <div class="form-actions">
                    <button class="primary-btn" type="submit">Save Contact</button>
                    <button class="secondary-btn" type="button" id="cancelContactForm">Cancel</button>
                </div>
            </form>
            <div id="contactsGrid" class="contacts-grid">
                <!-- Contact cards will be injected here by script.js -->
            </div>
            <div id="usersGrid" class="contacts-grid" style="display:none;">
                <!-- User cards will be injected here by script.js -->
            </div>
            <div id="loadingState" class="loading-state">
                <div class="spinner"></div>
                <p>Loading contacts from database&hellip;</p>
            </div>
            <div id="errorState" class="error-state" style="display:none;">
                <i class="fas fa-exclamation-triangle"></i>
                <h2>Could not load contacts</h2>
                <p>Make sure the backend server is running on port 8080.</p>
            </div>
        </main>
    </div>

</body>

</html>
